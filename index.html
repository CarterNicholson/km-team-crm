        const TasksPage = () => {
            const [tasks, setTasks] = React.useState([]);
            const [filteredTasks, setFilteredTasks] = React.useState([]);
            const [loading, setLoading] = React.useState(true);
            const [showModal, setShowModal] = React.useState(false);
            const [editingTask, setEditingTask] = React.useState(null);
            const [filterView, setFilterView] = React.useState('all');
            const [sortColumn, setSortColumn] = React.useState('due_date');
            const [sortOrder, setSortOrder] = React.useState('asc');
            const { show } = useToast();

            React.useEffect(() => {
                fetchTasks();
            }, []);

            React.useEffect(() => {
                filterAndSort();
            }, [tasks, filterView, sortColumn, sortOrder]);

            const fetchTasks = async () => {
                setLoading(true);
                const result = await api.request('GET', '/api/tasks');
                if (!result.error) {
                    setTasks(result.data || []);
                }
                setLoading(false);
            };

            const filterAndSort = () => {
                const now = new Date();
                const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());

                let filtered = tasks.filter((task) => {
                    const taskDate = new Date(task.due_date);
                    const taskDayStart = new Date(
                        taskDate.getFullYear(),
                        taskDate.getMonth(),
                        taskDate.getDate()
                    );

                    switch (filterView) {
                        case 'my':
                            return true;
                        case 'overdue':
                            return taskDayStart < today && !task.completed;
                        case 'today':
                            return taskDayStart.getTime() === today.getTime();
                        case 'week':
                            const weekEnd = new Date(today);
                            weekEnd.setDate(weekEnd.getDate() + 7);
                            return taskDayStart >= today && taskDayStart <= weekEnd;
                        default:
                            return true;
                    }
                });

                filtered.sort((a, b) => {
                    const aVal = sortColumn === 'due_date' ? new Date(a.due_date) : a[sortColumn] || '';
                    const bVal = sortColumn === 'due_date' ? new Date(b.due_date) : b[sortColumn] || '';
                    const comparison = aVal < bVal ? -1 : aVal > bVal ? 1 : 0;
                    return sortOrder === 'asc' ? comparison : -comparison;
                });

                setFilteredTasks(filtered);
            };

            const handleToggleComplete = async (task) => {
                const result = await api.request('PUT', `/api/tasks/${task.id}`, {
                    ...task,
                    completed: !task.completed,
                });

                if (result.error) {
                    show(result.error, 'error');
                } else {
                    fetchTasks();
                }
            };

            const handleSave = async (taskData) => {
                let result;
                if (editingTask) {
                    result = await api.request('PUT', `/api/tasks/${editingTask.id}`, taskData);
                } else {
                    result = await api.request('POST', '/api/tasks', taskData);
                }

                if (result.error) {
                    show(result.error, 'error');
                } else {
                    show(editingTask ? 'Task updated' : 'Task created', 'success');
                    setShowModal(false);
                    setEditingTask(null);
                    fetchTasks();
                }
            };

            const handleDelete = async (id) => {
                const result = await api.request('DELETE', `/api/tasks/${id}`);
                if (result.error) {
                    show(result.error, 'error');
                } else {
                    show('Task deleted', 'success');
                    fetchTasks();
                }
            };

            const getPriorityColor = (priority) => {
                switch (priority) {
                    case 'high':
                        return 'red';
                    case 'medium':
                        return 'yellow';
                    case 'low':
                        return 'gray';
                    default:
                        return 'blue';
                }
            };

            if (loading) return <Spinner />;

            return (
                <div className="space-y-4">
                    <div className="flex justify-between items-center">
                        <h1 className="text-2xl font-bold">Tasks</h1>
                        <button
                            onClick={() => {
                                setEditingTask(null);
                                setShowModal(true);
                            }}
                            className="bg-blue-600 hover:bg-blue-700 px-4 py-2 rounded text-white"
                        >
                            + Add Task
                        </button>
                    </div>

                    {/* Filter Tabs */}
                    <div className="flex gap-2 flex-wrap">
                        {['all', 'my', 'overdue', 'today', 'week'].map((view) => (
                            <button
                                key={view}
                                onClick={() => setFilterView(view)}
                                className={`px-4 py-2 rounded text-sm font-medium transition ${
                                    filterView === view
                                        ? 'bg-blue-600 text-white'
                                        : 'bg-slate-700 text-slate-300 hover:bg-slate-600'
                                }`}
                            >
                                {view === 'all'
                                    ? 'All Tasks'
                                    : view === 'my'
                                      ? 'My Tasks'
                                      : view === 'overdue'
                                        ? 'Overdue'
                                        : view === 'today'
                                          ? 'Due Today'
                                          : 'This Week'}
                            </button>
                        ))}
                    </div>

                    {/* Tasks List */}
                    {filteredTasks.length === 0 ? (
                        <EmptyState
                            icon="✓"
                            title="No tasks found"
                            message="Great! No tasks match your filters."
                            action={
                                <button
                                    onClick={() => {
                                        setEditingTask(null);
                                        setShowModal(true);
                                    }}
                                    className="bg-blue-600 hover:bg-blue-700 px-4 py-2 rounded text-white"
                                >
                                    Add Task
                                </button>
                            }
                        />
                    ) : (
                        <div className="space-y-2">
                            {filteredTasks.map((task) => {
                                const isOverdue = new Date(task.due_date) < new Date() && !task.completed;
                                return (
                                    <div
                                        key={task.id}
                                        className={`bg-slate-800 rounded-lg p-4 flex items-start gap-3 ${
                                            isOverdue ? 'ring-2 ring-red-600' : ''
                                        }`}
                                    >
                                        <input
                                            type="checkbox"
                                            checked={task.completed || false}
                                            onChange={() => handleToggleComplete(task)}
                                            className="mt-1 w-5 h-5"
                                        />
                                        <div className="flex-1">
                                            <p
                                                className={`font-medium ${
                                                    task.completed ? 'line-through text-slate-500' : 'text-white'
                                                }`}
                                            >
                                                {task.title}
                                            </p>
                                            <div className="flex gap-2 mt-2">
                                                <Badge color={getPriorityColor(task.priority)}>
                                                    {task.priority || 'Medium'}
                                                </Badge>
                                                <span className="text-xs text-slate-400">
                                                    {new Date(task.due_date).toLocaleDateString()}
                                                </span>
                                            </div>
                                            {task.notes && (
                                                <p className="text-sm text-slate-400 mt-2">{task.notes}</p>
                                            )}
                                        </div>
                                        <div className="flex gap-2">
                                            <button
                                                onClick={() => {
                                                    setEditingTask(task);
                                                    setShowModal(true);
                                                }}
                                                className="text-blue-400 hover:text-blue-300 text-sm"
                                            >
                                                Edit
                                            </button>
                                            <button
                                                onClick={() => handleDelete(task.id)}
                                                className="text-red-400 hover:text-red-300 text-sm"
                                            >
                                                Delete
                                            </button>
                                        </div>
                                    </div>
                                );
                            })}
                        </div>
                    )}

                    <TaskModal
                        isOpen={showModal}
                        onClose={() => {
                            setShowModal(false);
                            setEditingTask(null);
                        }}
                        onSave={handleSave}
                        initialData={editingTask}
                    />
                </div>
            );
        };

            const [currentPassword, setCurrentPassword] = React.useState('');
            const [newPassword, setNewPassword] = React.useState('');

            const [apiKey, setApiKey] = React.useState('');
            const [loading, setLoading] = React.useState(false);
            const { show } = useToast();

            const handleProfileUpdate = async (e) => {
                e.preventDefault();
                setLoading(true);
                const result = await api.request('PUT', `/api/users/${user.id}`, { name, email });
                if (result.error) {
                    show(result.error, 'error');
                } else {
                    show('Profile updated', 'success');
                }

            };

            const handlePasswordChange = async (e) => {
                e.preventDefault();
                if (newPassword !== confirmPassword) {
                    show('Passwords do not match', 'error');
                    return;
                }
                setLoading(true);
                const result = await api.request('PUT', `/api/users/${user.id}/password`, {
                    current_password: currentPassword,
                    new_password: newPassword,
                });
                if (result.error) {
                    show(result.error, 'error');
                } else {
                    show('Password changed', 'success');
                    setCurrentPassword('');
                    setNewPassword('');
                    setConfirmPassword('');
                }
                setLoading(false);
            };

            const handleApiKeyUpdate = async (e) => {
                e.preventDefault();
                setLoading(true);
                const result = await api.request('PUT', `/api/users/${user.id}`, { api_key: apiKey });

            React.useEffect(() => {
                const fetchActivity = async () => {
                    setLoading(true);
                    const result = await api.request('GET', '/api/activity');
                    if (!result.error) {
                        setActivity(result.data || []);
                    }
                    setLoading(false);
                };

                fetchActivity();
            }, []);

            if (loading) return <Spinner />;

            return (
                <div className="space-y-4">

                        <EmptyState

                            title="No activity yet"
                            message="Activity will appear here as you work in the CRM."

                    ) : (
                        <div className="bg-slate-800 rounded-lg divide-y divide-slate-700">

                                <div key={item.id} className="p-4 hover:bg-slate-700/30">
                                    <div className="flex items-start gap-3">
                                        <span className="text-2xl">{getActivityIcon(item.action)}</span>

        // ============================================================================
        // AI ASSISTANT PAGE
        // ============================================================================

        const AiAssistantPage = ({ user }) => {
            const [messages, setMessages] = React.useState([]);
            const [input, setInput] = React.useState('');
            const [loading, setLoading] = React.useState(false);
            const { show } = useToast();

            const hasApiKey = user?.api_key;

            const handleSendMessage = async () => {
                if (!input.trim()) return;

                const userMessage = input;
                setInput('');
                setMessages([...messages, { role: 'user', content: userMessage }]);
                setLoading(true);

                const result = await api.request('POST', '/api/ai/chat', {
                    messages: [...messages, { role: 'user', content: userMessage }],
                });

                if (result.error) {
                    show(result.error, 'error');
                } else {
                    setMessages([
                        ...messages,
                        { role: 'user', content: userMessage },
                        { role: 'assistant', content: result.data.content },
                    ]);
                }
                setLoading(false);
            };

            const quickActions = [
                'Draft Email',
                'Summarize My Pipeline',
                'Generate Call List',
                'Market Analysis',
            ];

            if (!hasApiKey) {
                return (
                    <EmptyState
                        icon="🤖"
                        title="AI Assistant Not Set Up"
                        message="Add your Claude API key in Settings to enable AI Assistant features."
                        action={
                            <button className="bg-blue-600 hover:bg-blue-700 px-4 py-2 rounded text-white">
                                Go to Settings
                            </button>
                        }
                    />
                );
            }

            return (
                <div className="h-full flex flex-col max-w-4xl">
                    <h1 className="text-2xl font-bold mb-4">AI Assistant</h1>

                    {/* Quick Actions */}
                    <div className="flex gap-2 mb-4 flex-wrap">
                        {quickActions.map((action) => (
                            <button
                                key={action}
                                onClick={() => setInput(action)}
                                className="text-xs px-3 py-2 bg-slate-700 hover:bg-slate-600 rounded"
                            >
                                {action}
                            </button>
                        ))}
                    </div>

                    {/* Messages */}
                    <div className="flex-1 bg-slate-800 rounded-lg p-4 mb-4 overflow-y-auto space-y-4">
                        {messages.length === 0 ? (
                            <p className="text-slate-400 text-center mt-8">
                                Start a conversation with your AI assistant
                            </p>
                        ) : (
                            messages.map((msg, idx) => (
                                <div
                                    key={idx}
                                    className={`flex ${msg.role === 'user' ? 'justify-end' : 'justify-start'}`}
                                >
                                    <div
                                        className={`max-w-md px-4 py-2 rounded-lg ${
                                            msg.role === 'user'
                                                ? 'bg-blue-600 text-white'
                                                : 'bg-slate-700 text-slate-200'
                                        }`}
                                    >
                                        {msg.content}
                                    </div>
                                </div>
                            ))
                        )}
                        {loading && <Spinner />}
                    </div>

                    {/* Input */}
                    <div className="flex gap-2">
                        <input
                            type="text"
                            value={input}
                            onChange={(e) => setInput(e.target.value)}
                            onKeyDown={(e) => e.key === 'Enter' && handleSendMessage()}
                            className="flex-1 bg-slate-800 rounded px-4 py-2 text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-blue-600"
                            placeholder="Ask me anything..."
                            disabled={loading}
                        />
                        <button
                            onClick={handleSendMessage}
                            disabled={loading || !input.trim()}
                            className="bg-blue-600 hover:bg-blue-700 px-4 py-2 rounded text-white disabled:opacity-50"
                        >
                            Send
                        </button>
                    </div>
                </div>
            );
        };

        // ============================================================================
        // IMPORT PAGE
        // ============================================================================

        const ImportPage = () => {
            const [companyFile, setCompanyFile] = React.useState(null);
            const [propertyFile, setPropertyFile] = React.useState(null);
            const [contactFile, setContactFile] = React.useState(null);
            const [activityFile, setActivityFile] = React.useState(null);
            const [dealFile, setDealFile] = React.useState(null);
            const [loadingCompany, setLoadingCompany] = React.useState(false);
            const [loadingProperty, setLoadingProperty] = React.useState(false);
            const [loadingContact, setLoadingContact] = React.useState(false);
            const [loadingActivity, setLoadingActivity] = React.useState(false);
            const [loadingDeal, setLoadingDeal] = React.useState(false);
            const [resultsCompany, setResultsCompany] = React.useState(null);
            const [resultsProperty, setResultsProperty] = React.useState(null);
            const [resultsContact, setResultsContact] = React.useState(null);
            const [resultsActivity, setResultsActivity] = React.useState(null);
            const [resultsDeal, setResultsDeal] = React.useState(null);
            const { show } = useToast();

            const handleFileSelect = (e, setFile) => {
                const file = e.target.files?.[0];
                if (file) {
                    setFile(file);
                }
            };

            const handleImport = async (file, endpoint, setLoading, setResults) => {
                if (!file) {
                    show('Please select a file', 'error');
                    return;
                }

                setLoading(true);
                const reader = new FileReader();
                reader.onload = async (event) => {
                    try {
                        const csv = event.target?.result;
                        const result = await api.request('POST', endpoint, { csv });

                        if (result.error) {
                            show(result.error, 'error');
                            setResults(null);
                        } else {
                            const { imported = 0, skipped = 0 } = result.data || {};
                            const total = imported + skipped;
                            setResults({ imported, skipped, total });
                            show(`Successfully imported ${imported} records`, 'success');
                        }
                    } catch (err) {
                        show('Error reading file', 'error');
                    } finally {
                        setLoading(false);
                    }
                };
                reader.readAsText(file);
            };

            return (
                <div className="space-y-6">
                    <div>
                        <h1 className="text-2xl font-bold mb-2">Import Data</h1>
                        <p className="text-slate-400 text-sm">Import your data from CRE OneSource CSV exports</p>
                    </div>

                    <div className="bg-blue-900/30 border border-blue-600/50 rounded-lg p-4 mb-6">
                        <p className="text-sm text-blue-200">
                            <span className="font-medium">📌 Import order matters:</span> 1) Companies → 2) Properties → 3) Contacts → 4) Activities → 5) Deals
                        </p>
                    </div>

                    <div className="grid grid-cols-1 gap-6">
                        {/* Companies Card */}
                        <div className="bg-slate-800 rounded-lg p-6 border border-slate-700">
                            <h2 className="text-xl font-bold mb-2">Companies</h2>
                            <p className="text-slate-400 text-sm mb-4">Import from CRE OneSource Companies export</p>

                            <div className="space-y-3">
                                <div className="flex items-center gap-3">
                                    <input
                                        type="file"
                                        accept=".csv"
                                        onChange={(e) => handleFileSelect(e, setCompanyFile)}
                                        className="flex-1 bg-slate-700 rounded px-3 py-2 text-white text-sm"
                                    />
                                    {companyFile && <span className="text-sm text-green-400">{companyFile.name}</span>}
                                </div>
                                <button
                                    onClick={() => handleImport(companyFile, '/api/import/companies', setLoadingCompany, setResultsCompany)}
                                    disabled={loadingCompany}
                                    className="w-full bg-blue-600 hover:bg-blue-700 disabled:opacity-50 px-4 py-2 rounded text-white font-medium transition flex items-center justify-center gap-2"
                                >
                                    {loadingCompany ? <Spinner /> : '📤'} Import Companies
                                </button>
                                {resultsCompany && (
                                    <div className="bg-green-900/30 border border-green-600/50 rounded p-3">
                                        <p className="text-sm text-green-200">
                                            ✓ Imported {resultsCompany.imported} records ({resultsCompany.skipped} skipped, Total: {resultsCompany.total})
                                        </p>
                                    </div>
                                )}
                            </div>
                        </div>

                        {/* Properties Card */}
                        <div className="bg-slate-800 rounded-lg p-6 border border-slate-700">
                            <h2 className="text-xl font-bold mb-2">Properties</h2>
                            <p className="text-slate-400 text-sm mb-4">Import from CRE OneSource Properties export</p>

                            <div className="space-y-3">
                                <div className="flex items-center gap-3">
                                    <input
                                        type="file"
                                        accept=".csv"
                                        onChange={(e) => handleFileSelect(e, setPropertyFile)}
                                        className="flex-1 bg-slate-700 rounded px-3 py-2 text-white text-sm"
                                    />
                                    {propertyFile && <span className="text-sm text-green-400">{propertyFile.name}</span>}
                                </div>
                                <button
                                    onClick={() => handleImport(propertyFile, '/api/import/properties', setLoadingProperty, setResultsProperty)}
                                    disabled={loadingProperty}
                                    className="w-full bg-blue-600 hover:bg-blue-700 disabled:opacity-50 px-4 py-2 rounded text-white font-medium transition flex items-center justify-center gap-2"
                                >
                                    {loadingProperty ? <Spinner /> : '📤'} Import Properties
                                </button>
                                {resultsProperty && (
                                    <div className="bg-green-900/30 border border-green-600/50 rounded p-3">
                                        <p className="text-sm text-green-200">
                                            ✓ Imported {resultsProperty.imported} records ({resultsProperty.skipped} skipped, Total: {resultsProperty.total})
                                        </p>
                                    </div>
                                )}
                            </div>
                        </div>

                        {/* Contacts Card */}
                        <div className="bg-slate-800 rounded-lg p-6 border border-slate-700">
                            <h2 className="text-xl font-bold mb-2">Contacts</h2>
                            <p className="text-slate-400 text-sm mb-4">Import from CRE OneSource Contacts export. Companies will be auto-created if needed.</p>

                            <div className="space-y-3">
                                <div className="flex items-center gap-3">
                                    <input
                                        type="file"
                                        accept=".csv"
                                        onChange={(e) => handleFileSelect(e, setContactFile)}
                                        className="flex-1 bg-slate-700 rounded px-3 py-2 text-white text-sm"
                                    />
                                    {contactFile && <span className="text-sm text-green-400">{contactFile.name}</span>}
                                </div>
                                <button
                                    onClick={() => handleImport(contactFile, '/api/import/contacts', setLoadingContact, setResultsContact)}
                                    disabled={loadingContact}
                                    className="w-full bg-blue-600 hover:bg-blue-700 disabled:opacity-50 px-4 py-2 rounded text-white font-medium transition flex items-center justify-center gap-2"
                                >
                                    {loadingContact ? <Spinner /> : '📤'} Import Contacts
                                </button>
                                {resultsContact && (
                                    <div className="bg-green-900/30 border border-green-600/50 rounded p-3">
                                        <p className="text-sm text-green-200">
                                            ✓ Imported {resultsContact.imported} records ({resultsContact.skipped} skipped, Total: {resultsContact.total})
                                        </p>
                                    </div>
                                )}
                            </div>
                        </div>

                        {/* Activities Card */}
                        <div className="bg-slate-800 rounded-lg p-6 border border-slate-700">
                            <h2 className="text-xl font-bold mb-2">Activities & Tasks</h2>
                            <p className="text-slate-400 text-sm mb-4">Import from CRE OneSource Activities export. Will be linked to contacts automatically.</p>

                            <div className="space-y-3">
                                <div className="flex items-center gap-3">
                                    <input
                                        type="file"
                                        accept=".csv"
                                        onChange={(e) => handleFileSelect(e, setActivityFile)}
                                        className="flex-1 bg-slate-700 rounded px-3 py-2 text-white text-sm"
                                    />
                                    {activityFile && <span className="text-sm text-green-400">{activityFile.name}</span>}
                                </div>
                                <button
                                    onClick={() => handleImport(activityFile, '/api/import/activities', setLoadingActivity, setResultsActivity)}
                                    disabled={loadingActivity}
                                    className="w-full bg-blue-600 hover:bg-blue-700 disabled:opacity-50 px-4 py-2 rounded text-white font-medium transition flex items-center justify-center gap-2"
                                >
                                    {loadingActivity ? <Spinner /> : '📤'} Import Activities
                                </button>
                                {resultsActivity && (
                                    <div className="bg-green-900/30 border border-green-600/50 rounded p-3">
                                        <p className="text-sm text-green-200">
                                            ✓ Imported {resultsActivity.imported} records ({resultsActivity.skipped} skipped, Total: {resultsActivity.total})
                                        </p>
                                    </div>
                                )}
                            </div>
                        </div>

                        {/* Deals Card */}
                        <div className="bg-slate-800 rounded-lg p-6 border border-slate-700">
                            <h2 className="text-xl font-bold mb-2">Deals</h2>
                            <p className="text-slate-400 text-sm mb-4">Import from CRE OneSource Deals export. Contacts and Properties must be imported first.</p>

                            <div className="space-y-3">
                                <div className="flex items-center gap-3">
                                    <input
                                        type="file"
                                        accept=".csv"
                                        onChange={(e) => handleFileSelect(e, setDealFile)}
                                        className="flex-1 bg-slate-700 rounded px-3 py-2 text-white text-sm"
                                    />
                                    {dealFile && <span className="text-sm text-green-400">{dealFile.name}</span>}
                                </div>
                                <button
                                    onClick={() => handleImport(dealFile, '/api/import/deals', setLoadingDeal, setResultsDeal)}
                                    disabled={loadingDeal}
                                    className="w-full bg-blue-600 hover:bg-blue-700 disabled:opacity-50 px-4 py-2 rounded text-white font-medium transition flex items-center justify-center gap-2"
                                >
                                    {loadingDeal ? <Spinner /> : '📤'} Import Deals
                                </button>
                                {resultsDeal && (
                                    <div className="bg-green-900/30 border border-green-600/50 rounded p-3">
                                        <p className="text-sm text-green-200">
                                            ✓ Imported {resultsDeal.imported} records ({resultsDeal.skipped} skipped, Total: {resultsDeal.total})
                                        </p>
                                    </div>
                                )}
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        // ============================================================================
        // MAIN LAYOUT & APP
        // ============================================================================

        const getActivityIcon = (action) => {
            const icons = {
                create: '✚',
                update: '✏️',
                delete: '🗑️',
                stage_change: '→',
                complete: '✓',
                login: '🔓',
            };
            return icons[action] || '•';
        };

        const formatDate = (dateString) => {
            const date = new Date(dateString);
            const now = new Date();
            const diff = now - date;

            if (diff < 60000) return 'just now';
            if (diff < 3600000) return `${Math.floor(diff / 60000)}m ago`;
            if (diff < 86400000) return `${Math.floor(diff / 3600000)}h ago`;
            if (diff < 604800000) return `${Math.floor(diff / 86400000)}d ago`;

            return date.toLocaleDateString();
        };

        const Layout = ({ page, onNavigate, user }) => {
            const [searchQuery, setSearchQuery] = React.useState('');
            const [searchResults, setSearchResults] = React.useState([]);
            const [showSearchResults, setShowSearchResults] = React.useState(false);
            const { show } = useToast();

            React.useEffect(() => {
                if (searchQuery.length >= 2) {
                    const search = async () => {
                        const result = await api.request('GET', `/api/search?q=${encodeURIComponent(searchQuery)}`);
                        if (!result.error) {
                            setSearchResults(result.data || []);
                            setShowSearchResults(true);
                        }
                    };
                    const timer = setTimeout(search, 300);
                    return () => clearTimeout(timer);
                }
                setShowSearchResults(false);
            }, [searchQuery]);

            const navItems = [
                { name: 'Dashboard', icon: '📊', id: 'dashboard' },
                { name: 'Contacts', icon: '👥', id: 'contacts' },
                { name: 'Companies', icon: '🏢', id: 'companies' },
                { name: 'Pipeline', icon: '📈', id: 'pipeline' },
                { name: 'Listings', icon: '🏪', id: 'listings' },
                { name: 'Properties', icon: '🏗️', id: 'properties' },
                { name: 'Tasks', icon: '✓', id: 'tasks' },
                { name: 'AI Assistant', icon: '🤖', id: 'ai' },
                { name: 'Import Data', icon: '📥', id: 'import' },
            ];

            return (
                <div className="flex h-screen bg-slate-950">
                    {/* Sidebar */}
                    <div className="w-64 bg-slate-900 border-r border-slate-800 flex flex-col">
                        {/* Logo */}
                        <div className="p-6 border-b border-slate-800">
                            <h1 className="text-xl font-bold flex items-center gap-2">
                                <span>🏢</span>KM Team CRM
                            </h1>
                        </div>

                        {/* Search */}
                        <div className="p-4 border-b border-slate-800 relative">
                            <input
                                type="text"
                                placeholder="Search..."
                                value={searchQuery}
                                onChange={(e) => setSearchQuery(e.target.value)}
                                className="w-full bg-slate-800 rounded px-3 py-2 text-white placeholder-slate-500 text-sm focus:outline-none focus:ring-2 focus:ring-blue-600"
                            />
                            {showSearchResults && searchResults.length > 0 && (
                                <div className="absolute top-full left-4 right-4 mt-2 bg-slate-800 rounded shadow-lg z-10 max-h-64 overflow-y-auto">
                                    {searchResults.map((result) => (
                                        <button
                                            key={result.id}
                                            onClick={() => {
                                                setSearchQuery('');
                                                setShowSearchResults(false);
                                                onNavigate(result.type);
                                            }}
                                            className="w-full text-left px-3 py-2 hover:bg-slate-700 text-sm"
                                        >
                                            <p className="font-medium">{result.name || result.title}</p>
                                            <p className="text-xs text-slate-400">{result.type}</p>
                                        </button>
                                    ))}
                                </div>
                            )}
                        </div>

                        {/* Nav */}
                        <nav className="flex-1 p-4 space-y-2 overflow-y-auto">
                            {navItems.map((item) => (
                                <button
                                    key={item.id}
                                    onClick={() => onNavigate(item.id)}
                                    className={`w-full text-left px-4 py-3 rounded text-sm font-medium transition ${
                                        page === item.id
                                            ? 'bg-blue-600 text-white'
                                            : 'text-slate-300 hover:bg-slate-800'
                                    }`}
                                >
                                    <span className="mr-2">{item.icon}</span>
                                    {item.name}
                                </button>
                            ))}
                        </nav>

                        {/* Bottom */}
                        <div className="border-t border-slate-800 p-4 space-y-2">
                            <button
                                onClick={() => onNavigate('activity')}
                                className={`w-full text-left px-4 py-2 rounded text-sm ${
                                    page === 'activity'
                                        ? 'bg-blue-600 text-white'
                                        : 'text-slate-300 hover:bg-slate-800'
                                }`}
                            >
                                📋 Activity Log
                            </button>
                            <button
                                onClick={() => onNavigate('settings')}
                                className={`w-full text-left px-4 py-2 rounded text-sm ${
                                    page === 'settings'
                                        ? 'bg-blue-600 text-white'
                                        : 'text-slate-300 hover:bg-slate-800'
                                }`}
                            >
                                ⚙️ Settings
                            </button>
                            <button
                                onClick={() => {
                                    const { logout } = useAuth();
                                    logout();
                                }}
                                className="w-full text-left px-4 py-2 rounded text-sm text-slate-300 hover:bg-slate-800"
                            >
                                🚪 {user?.name || 'User'} • Logout
                            </button>
                        </div>
                    </div>

                    {/* Main Content */}
                    <div className="flex-1 overflow-y-auto">
                        <div className="p-8">
                            {page === 'dashboard' && <DashboardPage onNavigate={onNavigate} />}
                            {page === 'contacts' && <ContactsPage />}
                            {page === 'pipeline' && <PipelinePage />}
                            {page === 'properties' && <PropertiesPage />}
                            {page === 'tasks' && <TasksPage />}
                            {page === 'settings' && <SettingsPage user={user} />}
                            {page === 'activity' && <ActivityLogPage />}
                            {page === 'ai' && <AiAssistantPage user={user} />}
                            {page === 'import' && <ImportPage />}
                        </div>
                    </div>
                </div>
            );
        };

        const App = () => {
            const { user, token, loading: authLoading, login, logout } = useAuth();
            const [currentPage, setCurrentPage] = React.useState('dashboard');
            const [setupNeeded, setSetupNeeded] = React.useState(false);
            const [checkingSetup, setCheckingSetup] = React.useState(true);
            const { toast, show, close } = useToast();

            React.useEffect(() => {
                const checkSetup = async () => {
                    const result = await api.request('GET', '/auth/status');
                    if (!result.error) {
                        setSetupNeeded(!result.hasUsers);
                    }
                    setCheckingSetup(false);
                };

                checkSetup();
            }, []);

            if (checkingSetup || authLoading) {
                return (
                    <div className="min-h-screen bg-slate-950 flex items-center justify-center">
                        <Spinner />
                    </div>
                );
            }

            if (setupNeeded) {
                return <SetupPage onSetupComplete={() => setSetupNeeded(false)} />;
            }

            if (!token) {
                return <LoginPage onLogin={login} />;
            }

            return (
                <>
                    <Layout page={currentPage} onNavigate={setCurrentPage} user={user} />
                    {toast && <div className="fixed bottom-4 right-4 z-50"><Toast {...toast} onClose={close} /></div>}
                </>
            );
        };

        // ============================================================================
        // RENDER
        // ============================================================================

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
