        // ============================================================================
        // IMPORT PAGE
        // ============================================================================

        // Detect CSV type from its headers
        const detectCsvType = (csvText) => {
            const firstLine = csvText.split('\n')[0].toLowerCase();
            if (firstLine.includes('company name') && firstLine.includes('address line')) return 'companies';
            if (firstLine.includes('first name') && firstLine.includes('last name')) return 'contacts';
            if (firstLine.includes('property name') || (firstLine.includes('address') && firstLine.includes('size') && firstLine.includes('type'))) return 'properties';
            if (firstLine.includes('activity type') || firstLine.includes('activity date') || firstLine.includes('subject')) return 'activities';
            if (firstLine.includes('deal name') || firstLine.includes('stage') || firstLine.includes('deal type')) return 'deals';
            return null;
        };

        const TYPE_META = {
            companies:  { label: 'Companies',        endpoint: '/api/import/companies',  icon: '🏢' },
            properties: { label: 'Properties',       endpoint: '/api/import/properties', icon: '🏗️' },
            contacts:   { label: 'Contacts',         endpoint: '/api/import/contacts',   icon: '👥' },
            activities: { label: 'Activities',       endpoint: '/api/import/activities', icon: '📋' },
            deals:      { label: 'Deals',            endpoint: '/api/import/deals',      icon: '📈' },
        };

        const ImportPage = () => {
            const [files, setFiles] = React.useState([]); // [{name, type, csv, status, result}]
            const [importing, setImporting] = React.useState(false);
            const [clearing, setClearing] = React.useState(false);
            const { show } = useToast();

            const clearEntity = async (entity, label) => {
                if (!confirm(`Are you sure you want to delete ALL ${label} data? This cannot be undone.`)) return;
                setClearing(true);
                const result = await api.request('DELETE', `/api/import/clear/${entity}`);
                if (result.data?.success) {
                    show(`${label} data cleared (${result.data.deleted} records)`, 'success');
                } else {
                    show(result.data?.error || 'Failed to clear', 'error');
                }
                setClearing(false);
            };

            const readFile = (file) => new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = (e) => resolve(e.target.result);
                reader.onerror = reject;
                reader.readAsText(file);
            });

            const handleFilesSelected = async (e) => {
                const selected = Array.from(e.target.files || []);
                if (!selected.length) return;
                const parsed = await Promise.all(selected.map(async (file) => {
                    const csv = await readFile(file);
                    const type = detectCsvType(csv);
                    return { name: file.name, type, csv, status: type ? 'ready' : 'unknown', result: null };
                }));
                setFiles(parsed);
            };

            const runImport = async () => {
                const order = ['companies', 'properties', 'contacts', 'activities', 'deals'];
                const ready = files.filter(f => f.type && f.status === 'ready');
                if (!ready.length) { show('No recognizable CSV files selected', 'error'); return; }

                setImporting(true);
                // Sort by import order
                const sorted = [...ready].sort((a, b) => order.indexOf(a.type) - order.indexOf(b.type));

                for (const f of sorted) {
                    setFiles(prev => prev.map(x => x.name === f.name ? { ...x, status: 'importing' } : x));
                    const meta = TYPE_META[f.type];
                    const result = await api.request('POST', meta.endpoint, { csv: f.csv });
                    const data = result.data || {};
                    setFiles(prev => prev.map(x => x.name === f.name ? {
                        ...x,
                        status: data.error ? 'error' : 'done',
                        result: data.error ? { error: data.error } : { imported: data.imported || 0, skipped: data.skipped || 0 }
                    } : x));
                }
                setImporting(false);
                show('Import complete!', 'success');
            };

            const hasReady = files.some(f => f.type && f.status === 'ready');

            return (
                <div className="space-y-6 max-w-2xl">
                    <div>
                        <h1 className="text-2xl font-bold mb-2">Import Data</h1>
                        <p className="text-slate-300 text-sm">Drop all your CRE OneSource CSV files at once — the importer will auto-detect each type and run them in the correct order.</p>
                    </div>

                    {/* Drop zone */}
                    <div className="bg-slate-800 border-2 border-dashed border-slate-600 rounded-lg p-8 text-center">
                        <div className="text-4xl mb-3">📂</div>
                        <p className="text-slate-300 font-medium mb-1">Select your CSV files</p>
                        <p className="text-slate-500 text-sm mb-4">You can select multiple files at once (Ctrl+click or Cmd+click)</p>
                        <label className="cursor-pointer inline-block px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded font-medium text-sm transition">
                            Browse Files
                            <input
                                type="file"
                                accept=".csv"
                                multiple
                                className="hidden"
                                onChange={handleFilesSelected}
                            />
                        </label>
                    </div>

                    {/* File list */}
                    {files.length > 0 && (
                        <div className="bg-slate-800 rounded-lg divide-y divide-slate-700">
                            {files.map((f, i) => {
                                const meta = f.type ? TYPE_META[f.type] : null;
                                return (
                                    <div key={i} className="px-4 py-3 flex items-center justify-between gap-3">
                                        <div className="flex items-center gap-3 min-w-0">
                                            <span className="text-xl">{meta ? meta.icon : '❓'}</span>
                                            <div className="min-w-0">
                                                <p className="text-sm font-medium truncate">{f.name}</p>
                                                <p className="text-xs text-slate-300">{meta ? meta.label : 'Unrecognized — will be skipped'}</p>
                                            </div>
                                        </div>
                                        <div className="flex-shrink-0 text-right">
                                            {f.status === 'ready' && <span className="text-xs bg-slate-700 text-slate-300 px-2 py-1 rounded">Ready</span>}
                                            {f.status === 'importing' && <span className="text-xs bg-blue-700 text-blue-200 px-2 py-1 rounded">Importing...</span>}
                                            {f.status === 'done' && f.result && (
                                                <span className="text-xs bg-green-900/50 text-green-300 px-2 py-1 rounded">
                                                    ✓ {f.result.imported} imported, {f.result.skipped} skipped
                                                </span>
                                            )}
                                            {f.status === 'error' && <span className="text-xs bg-red-900/50 text-red-300 px-2 py-1 rounded">Error</span>}
                                            {f.status === 'unknown' && <span className="text-xs bg-yellow-900/50 text-yellow-300 px-2 py-1 rounded">Skipped</span>}
                                        </div>
                                    </div>
                                );
                            })}
                        </div>
                    )}

                    {hasReady && (
                        <button
                            onClick={runImport}
                            disabled={importing}
                            className="w-full bg-blue-600 hover:bg-blue-700 disabled:opacity-50 px-4 py-3 rounded text-white font-medium transition flex items-center justify-center gap-2"
                        >
                            {importing ? <><Spinner /> Importing...</> : '🚀 Import All Files'}
                        </button>
                    )}

                    {/* Clear Data Section */}
                    <div className="bg-slate-800 rounded-lg p-6 border border-red-900/30">
                        <h2 className="text-lg font-bold mb-2 text-red-400">Clear Data for Re-Import</h2>
                        <p className="text-slate-300 text-sm mb-4">Delete existing records before re-importing. This is permanent.</p>
                        <div className="flex flex-wrap gap-2">
                            {[
                                { entity: 'companies', label: 'Companies' },
                                { entity: 'properties', label: 'Properties' },
                                { entity: 'contacts', label: 'Contacts' },
                                { entity: 'tasks', label: 'Activities/Tasks' },
                                { entity: 'deals', label: 'Deals' },
                            ].map(({ entity, label }) => (
                                <button key={entity} onClick={() => clearEntity(entity, label)} disabled={clearing}
                                    className="px-3 py-1.5 bg-red-900/40 hover:bg-red-800/60 text-red-300 rounded text-sm disabled:opacity-50 transition">
                                    Clear {label}
                                </button>
                            ))}
                            <button onClick={() => clearEntity('all', 'ALL')} disabled={clearing}
                                className="px-3 py-1.5 bg-red-800 hover:bg-red-700 text-white rounded text-sm disabled:opacity-50 transition font-medium">
                                Clear Everything
                            </button>
                        </div>
                    </div>
                </div>
            );
        };

        // ============================================================================
        // MAIN LAYOUT & APP
        // ============================================================================

        const getActivityIcon = (action) => {
            const icons = {
                create: '✚',
                update: '✏️',
                delete: '🗑️',
                stage_change: '→',
                complete: '✓',
                login: '🔓',
            };
            return icons[action] || '•';
        };

        const formatDate = (dateString) => {
            const date = new Date(dateString);
            const now = new Date();
            const diff = now - date;

            if (diff < 60000) return 'just now';
            if (diff < 3600000) return `${Math.floor(diff / 60000)}m ago`;
            if (diff < 86400000) return `${Math.floor(diff / 3600000)}h ago`;
            if (diff < 604800000) return `${Math.floor(diff / 86400000)}d ago`;

            return date.toLocaleDateString();
        };

        const Layout = ({ page, onNavigate, user, logout }) => {
            const [searchQuery, setSearchQuery] = React.useState('');
            const [searchResults, setSearchResults] = React.useState([]);
            const [showSearchResults, setShowSearchResults] = React.useState(false);
            const { show } = useToast();

            React.useEffect(() => {
                if (searchQuery.length >= 2) {
                    const search = async () => {
                        const result = await api.request('GET', `/api/search?q=${encodeURIComponent(searchQuery)}`);
                        if (!result.error) {
                            setSearchResults(result.data || []);
                            setShowSearchResults(true);
                        }
                    };
                    const timer = setTimeout(search, 300);
                    return () => clearTimeout(timer);
                }
                setShowSearchResults(false);
            }, [searchQuery]);

            const navItems = [
                { name: 'Dashboard', icon: '📊', id: 'dashboard' },
                { name: 'Contacts', icon: '👥', id: 'contacts' },
                { name: 'Companies', icon: '🏢', id: 'companies' },
                { name: 'Pipeline', icon: '📈', id: 'pipeline' },
                { name: 'Listings', icon: '🏪', id: 'listings' },
                { name: 'Properties', icon: '🏗️', id: 'properties' },
                { name: 'Tasks', icon: '✓', id: 'tasks' },
                { name: 'AI Assistant', icon: '🤖', id: 'ai' },
                { name: 'Import Data', icon: '📥', id: 'import' },
            ];

            return (
                <div className="flex h-screen bg-slate-900">
                    {/* Sidebar */}
                    <div className="w-64 bg-slate-800 border-r border-slate-700 flex flex-col">
                        {/* Logo */}
                        <div className="p-6 border-b border-slate-700">
                            <h1 className="text-xl font-bold flex items-center gap-2">
                                <span>🏢</span>KM Team CRM
                            </h1>
                        </div>

                        {/* Search */}
                        <div className="p-4 border-b border-slate-700 relative">
                            <input
                                type="text"
                                placeholder="Search..."
                                value={searchQuery}
                                onChange={(e) => setSearchQuery(e.target.value)}
                                className="w-full bg-slate-800 rounded px-3 py-2 text-white placeholder-slate-400 text-sm focus:outline-none focus:ring-2 focus:ring-blue-600"
                            />
                            {showSearchResults && searchResults.length > 0 && (
                                <div className="absolute top-full left-4 right-4 mt-2 bg-slate-800 rounded shadow-lg z-10 max-h-64 overflow-y-auto">
                                    {searchResults.map((result) => (
                                        <button
                                            key={result.id}
                                            onClick={() => {
                                                setSearchQuery('');
                                                setShowSearchResults(false);
                                                onNavigate(result.type);
                                            }}
                                            className="w-full text-left px-3 py-2 hover:bg-slate-700 text-sm"
                                        >
                                            <p className="font-medium">{result.name || result.title}</p>
                                            <p className="text-xs text-slate-300">{result.type}</p>
                                        </button>
                                    ))}
                                </div>
                            )}
                        </div>

                        {/* Nav */}
                        <nav className="flex-1 p-4 space-y-2 overflow-y-auto">
                            {navItems.map((item) => (
                                <button
                                    key={item.id}
                                    onClick={() => onNavigate(item.id)}
                                    className={`w-full text-left px-4 py-3 rounded text-sm font-medium transition ${
                                        page === item.id
                                            ? 'bg-blue-600 text-white'
                                            : 'text-slate-300 hover:bg-slate-800'
                                    }`}
                                >
                                    <span className="mr-2">{item.icon}</span>
                                    {item.name}
                                </button>
                            ))}
                        </nav>

                        {/* Bottom */}
                        <div className="border-t border-slate-700 p-4 space-y-2">
                            <button
                                onClick={() => onNavigate('activity')}
                                className={`w-full text-left px-4 py-2 rounded text-sm ${
                                    page === 'activity'
                                        ? 'bg-blue-600 text-white'
                                        : 'text-slate-300 hover:bg-slate-800'
                                }`}
                            >
                                📋 Activity Log
                            </button>
                            <button
                                onClick={() => onNavigate('settings')}
                                className={`w-full text-left px-4 py-2 rounded text-sm ${
                                    page === 'settings'
                                        ? 'bg-blue-600 text-white'
                                        : 'text-slate-300 hover:bg-slate-800'
                                }`}
                            >
                                ⚙️ Settings
                            </button>
                            <button
                                onClick={logout}
                                className="w-full text-left px-4 py-2 rounded text-sm text-slate-300 hover:bg-slate-800"
                            >
                                🚪 {user?.name || 'User'} • Logout
                            </button>
                        </div>
                    </div>

                    {/* Main Content */}
                    <div className="flex-1 overflow-y-auto">
                        <div className="p-8">
                            {page === 'dashboard' && <DashboardPage onNavigate={onNavigate} />}
                            {page === 'contacts' && <ContactsPage />}
                            {page === 'pipeline' && <PipelinePage />}
                            {page === 'properties' && <PropertiesPage />}
                            {page === 'tasks' && <TasksPage />}
                            {page === 'settings' && <SettingsPage user={user} />}
                            {page === 'activity' && <ActivityLogPage />}
                            {page === 'ai' && <AiAssistantPage user={user} />}
                            {page === 'import' && <ImportPage />}
                        </div>
                    </div>
                </div>
            );
        };

        const App = () => {
            const { user, token, loading: authLoading, login, logout } = useAuth();
            const [currentPage, setCurrentPage] = React.useState('dashboard');
            const [setupNeeded, setSetupNeeded] = React.useState(false);
            const [checkingSetup, setCheckingSetup] = React.useState(true);
            const { toast, show, close } = useToast();

            React.useEffect(() => {
                const checkSetup = async () => {
                    // If user already has a valid token, skip setup check entirely
                    if (token) {
                        setCheckingSetup(false);
                        return;
                    }
                    const result = await api.request('GET', '/auth/status');
                    if (!result.error) {
                        setSetupNeeded(!result.hasUsers);
                    }
                    setCheckingSetup(false);
                };

                checkSetup();
            }, []);

            if (checkingSetup || authLoading) {
                return (
                    <div className="min-h-screen bg-slate-900 flex items-center justify-center">
                        <Spinner />
                    </div>
                );
            }

            if (setupNeeded) {
                return <SetupPage onSetupComplete={() => setSetupNeeded(false)} />;
            }

            if (!token) {
                return <LoginPage onLogin={login} />;
            }

            return (
                <>
                    <Layout page={currentPage} onNavigate={setCurrentPage} user={user} logout={logout} />
                    {toast && <div className="fixed bottom-4 right-4 z-50"><Toast {...toast} onClose={close} /></div>}
                </>
            );
        };

        // ============================================================================
        // RENDER
        // ============================================================================

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
